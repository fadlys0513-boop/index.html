<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untuk Mikaa Cantik</title>
    <!-- Menggunakan font estetik dari Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff85a1;
            --bg: #1a1a1a;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background Gradient Animasi */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #1a1a1a, #4a0e1c, #1a1a1a);
            background-size: 400% 400%;
            animation: gradientMove 10s ease infinite;
            z-index: -1;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            max-width: 400px;
            width: 85%;
            transform: translateY(30px);
            opacity: 0;
            animation: slideUp 1.2s ease forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        .heart-main {
            font-size: 60px;
            filter: drop-shadow(0 0 10px var(--primary));
            animation: beat 1s infinite alternate;
            margin-bottom: 20px;
        }

        @keyframes beat {
            to { transform: scale(1.2); }
        }

        h1 {
            color: white;
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        h2 {
            font-family: 'Dancing Script', cursive;
            color: var(--primary);
            font-size: 2.8rem;
            margin-top: 0;
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.5);
        }

        /* Particle Hati */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: fly 3s linear forwards;
            color: var(--primary);
        }

        @keyframes fly {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="gradient-bg"></div>

    <div class="card">
        <div class="heart-main">❤️</div>
        <h1>Makasih Sudah di Buka</h1>
        <h2>Mikaa Cantik</h2>
    </div>

    <script>
        // Efek partikel hati saat mouse bergerak atau layar disentuh
        document.addEventListener('mousemove', function(e) {
            createParticle(e.clientX, e.clientY);
        });

        document.addEventListener('touchstart', function(e) {
            createParticle(e.touches[0].clientX, e.touches[0].clientY);
        });

        function createParticle(x, y) {
            const particle = document.createElement('div');
            particle.innerHTML = '❤️';
            particle.className = 'particle';
            particle.style.left = x + 'px';
            particle.style.top = y + 'px';
            
            const size = Math.random() * 20 + 10;
            particle.style.fontSize = size + 'px';
            
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 2000);
        }
    </script>
</body>
</html>
