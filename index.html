<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Special for Mikaa Cantik</title>
    <!-- Font Estetik -->
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0d;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-color: #ffffff;
            --accent-color: #ff4d6d; /* Merah Muda Romantis */
            --sub-text: #cccccc;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%; height: 100%;
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            overflow: hidden;
            color: var(--text-color);
            display: flex; justify-content: center; align-items: center;
        }

        /* ----- Halaman Intro ----- */
        #intro-page {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 100;
            transition: opacity 1s ease, visibility 1s;
        }

        #intro-page.fade-out {
            opacity: 0; visibility: hidden;
        }

        .envelope-icon {
            font-size: 80px; color: var(--accent-color);
            filter: drop-shadow(0 0 20px rgba(255, 77, 109, 0.5));
            animation: float 2s infinite ease-in-out;
            margin-bottom: 30px;
        }

        .open-btn {
            background: transparent; border: 2px solid var(--accent-color);
            color: var(--accent-color); padding: 15px 40px;
            font-size: 1.1rem; font-weight: 600; border-radius: 50px;
            cursor: pointer; transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 1px;
        }

        .open-btn:hover {
            background: var(--accent-color); color: white;
            box-shadow: 0 0 30px rgba(255, 77, 109, 0.6);
            transform: scale(1.05);
        }

        /* ----- Halaman Utama ----- */
        #main-page {
            opacity: 0; transform: scale(0.9);
            transition: all 1s ease 0.5s; /* Delay setelah intro fade out */
            text-align: center; width: 90%; max-width: 400px;
            z-index: 10;
        }

        #main-page.fade-in {
            opacity: 1; transform: scale(1);
        }

        .heart-icon {
            font-size: 60px; color: var(--accent-color);
            filter: drop-shadow(0 0 15px var(--accent-color));
            animation: beat 0.8s infinite alternate;
            margin-bottom: 20px;
        }

        h1.title {
            font-size: 1.5rem; font-weight: 300;
            margin-bottom: 10px; letter-spacing: 1px;
        }

        h2.name {
            font-family: 'Caveat', cursive;
            color: var(--accent-color); font-size: 3.5rem;
            margin-bottom: 30px; line-height: 1;
            text-shadow: 0 0 15px rgba(255, 77, 109, 0.4);
        }

        /* Kotak Pesan Typing */
        .message-box {
            background: var(--card-bg);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 20px; border-radius: 20px;
            min-height: 150px; /* Jaga tinggi agar tidak melompat */
            text-align: left; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        #typing-text {
            color: var(--sub-text); font-size: 1rem;
            line-height: 1.8; font-weight: 400;
        }

        .cursor {
            display: inline-block; width: 8px; background-color: var(--accent-color);
            animation: blink 0.7s infinite; margin-left: 2px;
        }

        /* ----- Animasi Keyframes ----- */
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes beat { to { transform: scale(1.15); } }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes fadeOut { to { opacity: 0; visibility: hidden; } }

        /* ----- Partikel Hati Background ----- */
        #heart-particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        .particle {
            position: absolute; color: rgba(255, 77, 109, 0.2);
            animation: fall linear infinite; pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); }
        }

    </style>
</head>
<body>

    <!-- Latar Belakang Musik (Ganti URL dengan lagu pilihanmu) -->
    <!-- Lagu contoh: Instrumental Romantis Halus -->
    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/audio/2022/05/27/audio_1303866657803734000.mp3" type="audio/mpeg">
    </audio>

    <!-- Partikel Hati -->
    <div id="heart-particles"></div>

    <!-- HALAMAN 1: INTRO (Surat Tutup) -->
    <div id="intro-page">
        <div class="envelope-icon">✉️</div>
        <button class="open-btn" onclick="openMessage()">Buka Pesan</button>
    </div>

    <!-- HALAMAN 2: UTAMA (Surat Terbuka) -->
    <div id="main-page">
        <div class="heart-icon">❤️</div>
        <h1 class="title">Makasih Sudah di Buka</h1>
        <h2 class="name">Mikaa Cantik</h2>
        
        <div class="message-box">
            <p id="typing-text"></p><span class="cursor">&nbsp;</span>
        </div>
    </div>

    <script>
        // --- Konfigurasi Pesan ---
        // Kamu bisa ubah teks di bawah ini sesukamu. Gunakan <br> untuk garis baru.
        const pesanMikaa = "Cuma mau bilang...<br><br>Makasih ya, Mikaa, sudah hadir dan mewarnai hari-hariku.<br><br>Kamu itu spesial, dan aku bersyukur banget bisa kenal kamu.<br><br>Stay happy, stay healthy, and stay as amazing as you are.<br><br>P.S. Senyum terus ya hari ini! 😊❤️";

        // --- Fungsi Utama ---
        function openMessage() {
            // 1. Putar Musik
            const music = document.getElementById('bg-music');
            music.play().catch(error => {
                // Autoplay sering diblokir browser, ini handlingnya
                console.log("Musik diblokir browser. Butuh interaksi user.");
            });

            // 2. Transisi Halaman
            document.getElementById('intro-page').classList.add('fade-out');
            document.getElementById('main-page').classList.add('fade-in');

            // 3. Mulai Efek Mengetik (dengan delay sedikit)
            setTimeout(startTyping, 1500);
        }

        // --- Efek Mengetik (Typing Effect) ---
        let index = 0;
        const textElement = document.getElementById('typing-text');

        function startTyping() {
            if (index < pesanMikaa.length) {
                // Cek jika karakter adalah HTML tag
                if (pesanMikaa.substring(index, index + 4) === '<br>') {
                    textElement.innerHTML += '<br>';
                    index += 4;
                } else {
                    textElement.innerHTML += pesanMikaa.charAt(index);
                    index++;
                }
                // Kecepatan mengetik (semakin kecil semakin cepat)
                setTimeout(startTyping, 50); 
            } else {
                // Selesai mengetik, hilangkan kursor
                document.querySelector('.cursor').style.display = 'none';
            }
        }

        // --- Efek Hujan Hati (Background Particles) ---
        function createParticles() {
            const container = document.getElementById('heart-particles');
            const heartTypes = ['❤️', '💖', '🌸', '✨'];
            
            // Buat 50 partikel
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.innerHTML = heartTypes[Math.floor(Math.random() * heartTypes.length)];
                
                // Posisi & Animasi Acak
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.fontSize = (Math.random() * 15 + 10) + 'px'; // 10px - 25px
                particle.style.animationDuration = (Math.random() * 3 + 2) + 's'; // 2s - 5s
                particle.style.animationDelay = (Math.random() * 5) + 's';
                particle.style.opacity = Math.random() * 0.5 + 0.1; // Sedikit transparan

                container.appendChild(particle);
            }
        }

        // Jalankan partikel saat halaman dimuat
        window.onload = createParticles;

    </script>
</body>
</html>
